<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تحدي التفاحة الذهبية 🍎</title>
    <style>
        :root {
            --bg-color: #0f1218;
            --brick-grad: linear-gradient(145deg, #3a3f47, #1a1d22);
            --brick-border: #4a4f58;
            --accent-gold: #ffcc00;
            --error-red: #e74c3c;
            --win-green: #2ecc71;
        }
        
        body {
            margin: 0; background-color: var(--bg-color); color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* شاشة القفل */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1b2028 0%, #0b0e14 100%);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .login-box {
            background: #1c2128; padding: 40px; border-radius: 20px;
            border: 2px solid var(--accent-gold); text-align: center;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
        }
        input { 
            padding: 12px; border-radius: 10px; border: 1px solid #30363d; 
            background: #0d1117; color: white; width: 100%; margin: 20px 0; 
            text-align: center; font-size: 1.1rem;
        }
        
        #main-game { display: none; width: 100%; flex-direction: column; align-items: center; height: 100%; }

        .header { 
            padding: 20px; text-align: center; width: 100%; 
            background: #161b22; border-bottom: 2px solid #30363d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        /* لوحة اللعبة */
        #game-board {
            display: flex; flex-direction: column-reverse; gap: 10px; padding: 15px;
            width: 90vw; max-width: 400px; margin-top: 15px;
        }

        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; opacity: 0.3; pointer-events: none; }
        .row.active { opacity: 1; pointer-events: auto; }

        /* شكل الطوب الجديد (مثل الصناديق) */
        .brick {
            height: 50px;
            background: var(--brick-grad);
            border: 1px solid var(--brick-border);
            border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            position: relative;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 5px 0 #000;
            font-size: 1.6rem;
            transition: all 0.1s ease;
        }

        .brick:active {
            transform: translateY(3px);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 2px 0 #000;
        }

        /* حالة الفوز (تفاحة) */
        .brick.correct {
            background: linear-gradient(145deg, #f1c40f, #d4ac0d) !important;
            border-color: #f7dc6f;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.4);
            animation: bounce 0.4s ease;
        }

        /* حالة الخسارة (قنبلة) */
        .brick.wrong {
            background: linear-gradient(145deg, #2c2c2c, #1a1a1a) !important;
            border-color: #444;
            opacity: 0.8;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* التحكم */
        .controls { padding: 25px; display: flex; gap: 15px; width: 100%; justify-content: center; }
        
        button { 
            background: var(--accent-gold); color: #000; border: none; 
            padding: 14px 25px; border-radius: 12px; font-weight: bold; 
            cursor: pointer; font-size: 1rem; box-shadow: 0 4px 0 #b38f00;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #b38f00; }
        .btn-reset { background: #444; color: white; box-shadow: 0 4px 0 #222; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h1 style="color: var(--accent-gold); margin-top: 0;">APPLE GAME 🍎</h1>
            <input type="password" id="pass-input" placeholder="كلمة السر">
            <button onclick="checkCode()" style="width: 100%;">دخول</button>
        </div>
    </div>

    <div id="main-game">
        <div class="header">
            <div id="msg" style="color: var(--accent-gold); font-size: 1.3rem; font-weight: bold;">اختر صندوقاً! 🍎</div>
            <div style="color: #888; margin-top: 5px;">الدور: <span id="lvl-num" style="color: white;">1</span> / 10</div>
        </div>

        <div id="game-board"></div>

        <div class="controls">
            <button class="btn-reset" onclick="resetCurrentLevel()">تراجع 🔄</button>
            <button onclick="initGame()">لعبة جديدة 🚩</button>
        </div>
    </div>

    <script>
        const SECRET_CODE = "151994";
        const board = document.getElementById('game-board');
        const lvlDisplay = document.getElementById('lvl-num');
        const msgDisplay = document.getElementById('msg');
        let currentRow = 0;
        const difficulty = [1, 1, 1, 1, 2, 2, 2, 3, 3, 4];
        let levelData = [];

        function checkCode() {
            if (document.getElementById('pass-input').value === SECRET_CODE) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-game').style.display = 'flex';
                initGame();
            }
        }

        function initGame() {
            board.innerHTML = ''; currentRow = 0; levelData = []; lvlDisplay.innerText = 1;
            msgDisplay.innerText = "توقع مكان التفاحة! 🍎";
            msgDisplay.style.color = "var(--accent-gold)";
            
            for (let i = 0; i < 10; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row' + (i === 0 ? ' active' : '');
                rowDiv.id = `row-${i}`;
                
                let indices = [0, 1, 2, 3, 4];
                let wrongPos = indices.sort(() => Math.random() - 0.5).slice(0, difficulty[i]);
                levelData.push(wrongPos);

                for (let j = 0; j < 5; j++) {
                    const brick = document.createElement('div');
                    brick.className = 'brick';
                    brick.id = `brick-${i}-${j}`;
                    brick.onclick = () => handleBrickClick(i, j);
                    rowDiv.appendChild(brick);
                }
                board.appendChild(rowDiv);
            }
        }

        function handleBrickClick(r, c) {
            const brick = document.getElementById(`brick-${r}-${c}`);
            if (brick.classList.contains('correct') || brick.classList.contains('wrong')) return;

            if (levelData[r].includes(c)) {
                brick.classList.add('wrong'); 
                brick.innerHTML = '💣'; 
                msgDisplay.innerText = "قنبلة! جرب مرة أخرى 💣";
                msgDisplay.style.color = "var(--error-red)";
            } else {
                brick.classList.add('correct'); 
                brick.innerHTML = '🍎'; 
                msgDisplay.innerText = "عظيم! أكمل الصعود 🍎";
                msgDisplay.style.color = "var(--win-green)";
                setTimeout(() => nextLevel(), 400);
            }
        }

        function nextLevel() {
            if (currentRow < 9) {
                document.getElementById(`row-${currentRow}`).classList.remove('active');
                currentRow++;
                document.getElementById(`row-${currentRow}`).classList.add('active');
                lvlDisplay.innerText = currentRow + 1;
            } else {
                msgDisplay.innerText = "🏆 أسطورة! فزت بالتحدي!";
                msgDisplay.style.color = "var(--accent-gold)";
            }
        }

        function resetCurrentLevel() {
            const bricks = document.querySelectorAll(`#row-${currentRow} .brick`);
            bricks.forEach(b => { b.classList.remove('wrong', 'correct'); b.innerHTML = ''; });
            msgDisplay.innerText = "عدت للدور الحالي.. ركز! 🍎";
        }
    </script>
</body>
</html>
