<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>APPLE HACK VIP 🍎</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --accent-gold: #ffcc00;
            --3d-gold: #b38f00;
            --neon-blue: #00f3ff;
            --win-green: #2ecc71;
            --bomb-red: #e74c3c;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color); color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* تصميم الأزرار 3D الاحترافي */
        .btn-3d-pro {
            padding: 15px 25px;
            font-size: 1rem;
            font-weight: bold;
            color: #000;
            background: linear-gradient(180deg, #ffdb4d 0%, var(--accent-gold) 100%);
            border: none;
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--3d-gold), 0 10px 20px rgba(0,0,0,0.4);
            transition: 0.1s;
            text-transform: uppercase;
            width: 100%;
        }
        .btn-3d-pro:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--3d-gold), 0 5px 10px rgba(0,0,0,0.4);
        }

        /* شاشات الحماية */
        .overlay {
            position: fixed; inset: 0; background: var(--bg-color);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .login-box {
            background: #161b22; padding: 35px; border-radius: 25px; border: 1px solid var(--accent-gold);
            text-align: center; width: 90%; max-width: 380px; box-shadow: 0 0 40px rgba(255, 204, 0, 0.1);
        }
        input { padding: 15px; margin: 15px 0; width: 100%; text-align: center; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-size: 1.1rem; outline: none; }

        /* منطقة اللعبة */
        .header { height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0; }
        .attempts-counter { background: rgba(255, 204, 0, 0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--accent-gold); color: var(--accent-gold); font-weight: bold; margin-bottom: 5px; }

        #game-board { display: flex; flex-direction: column-reverse; gap: 8px; width: 90vw; max-width: 320px; margin: 20px auto; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; opacity: 0.15; pointer-events: none; }
        .row.active { opacity: 1; pointer-events: auto; transform: scale(1.02); }

        .brick {
            height: 45px; background: #2a2f3a; border-radius: 8px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; border: 1px solid #3d444d; box-shadow: 0 4px 0 #000; transition: 0.1s; font-size: 1.2rem;
        }
        .brick.correct { background: var(--win-green) !important; box-shadow: 0 4px 0 #1b7a43; }
        .brick.wrong { background: var(--bomb-red) !important; box-shadow: 0 4px 0 #822a22; }

        .controls { height: 120px; display: flex; gap: 10px; width: 100%; justify-content: center; align-items: center; background: #161b22; padding-bottom: 20px; }
    </style>
</head>
<body>

    <div id="pass-screen" class="overlay">
        <div class="login-box">
            <h2 style="color: var(--accent-gold); margin-bottom: 20px;">SYSTEM KEY 🔐</h2>
            <input type="password" id="pass-input" placeholder="أدخل كود المرور">
            <button class="btn-3d-pro" onclick="verifyPass()">فتح النظام</button>
        </div>
    </div>

    <div id="id-screen" class="overlay" style="display: none;">
        <div class="login-box">
            <h2 style="color: var(--neon-blue); margin-bottom: 10px;">ID VERIFICATION 🆔</h2>
            <p style="color: #888; font-size: 0.9rem; margin-bottom: 15px;">المعرف المسموح: 10020036</p>
            <input type="text" id="id-input" placeholder="أدخل المعرف (ID)">
            <button class="btn-3d-pro" style="background: var(--neon-blue); box-shadow: 0 6px 0 #008ba3;" onclick="verifyID()">تحقق من الصلاحية</button>
        </div>
    </div>

    <div id="main-game" style="display:none; flex-direction: column; height: 100%;">
        <div class="header">
            <div class="attempts-counter">المحاولات المتبقية: <span id="attempts-val">3</span></div>
            <div id="msg" style="color: white; font-size: 0.9rem;">بانتظار بدء الجولة...</div>
        </div>
        
        <div id="game-container" style="flex: 1; overflow-y: auto;">
            <div id="game-board"></div>
        </div>

        <div class="controls">
            <button class="btn-3d-pro" style="width: 40%; background: #444; box-shadow: 0 6px 0 #222; color: white;" onclick="resetRow()">تراجع</button>
            <button class="btn-3d-pro" style="width: 50%;" id="start-btn" onclick="initGame()">جولة جديدة 🚩</button>
        </div>
    </div>

    <script>
        const MASTER_PASS = "102075";
        const ALLOWED_ID = "10020036";
        let attempts = 3;
        let currentRow = 0;
        let levelData = [];

        function verifyPass() {
            if (document.getElementById('pass-input').value === MASTER_PASS) {
                document.getElementById('pass-screen').style.display = 'none';
                document.getElementById('id-screen').style.display = 'flex';
            } else { alert("❌ الباسورد غلط!"); }
        }

        function verifyID() {
            const inputID = document.getElementById('id-input').value;
            if (inputID === ALLOWED_ID) {
                document.getElementById('id-screen').style.display = 'none';
                document.getElementById('main-game').style.display = 'flex';
                updateAttemptsUI();
            } else { alert("⚠️ الـ ID غير مصرح له بالدخول!"); }
        }

        function updateAttemptsUI() {
            document.getElementById('attempts-val').innerText = attempts;
            if (attempts <= 0) {
                document.getElementById('start-btn').disabled = true;
                document.getElementById('start-btn').style.opacity = "0.5";
                document.getElementById('msg').innerText = "🚫 انتهت محاولاتك! تواصل مع المطور.";
                document.getElementById('msg').style.color = "var(--bomb-red)";
            }
        }

        function initGame() {
            if (attempts <= 0) return;
            
            attempts--;
            updateAttemptsUI();
            
            const board = document.getElementById('game-board');
            board.innerHTML = ''; 
            currentRow = 0; 
            levelData = [];
            document.getElementById('msg').innerText = "🍎 جولة جديدة بدأت.. ركز!";
            document.getElementById('msg').style.color = "white";

            for (let i = 0; i < 10; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row' + (i === 0 ? ' active' : '');
                rowDiv.id = `row-${i}`;
                
                // توزيع القنابل
                let bombCount = (i < 4) ? 1 : (i < 7) ? 2 : 3;
                let bombs = [0, 1, 2, 3, 4].sort(() => Math.random() - 0.5).slice(0, bombCount);
                levelData.push(bombs);

                for (let j = 0; j < 5; j++) {
                    const brick = document.createElement('div');
                    brick.className = 'brick';
                    brick.id = `brick-${i}-${j}`;
                    brick.onclick = () => handleBrick(i, j);
                    rowDiv.appendChild(brick);
                }
                board.appendChild(rowDiv);
            }
        }

        function handleBrick(r, c) {
            if (r !== currentRow) return;
            const brick = document.getElementById(`brick-${r}-${c}`);
            
            if (levelData[r].includes(c)) {
                brick.classList.add('wrong'); brick.innerHTML = '💣';
                document.getElementById('msg').innerText = "فخ! جرب تراجع أو ابدأ من جديد";
            } else {
                brick.classList.add('correct'); brick.innerHTML = '🍎';
                setTimeout(() => {
                    if (currentRow < 9) {
                        document.getElementById(`row-${currentRow}`).classList.remove('active');
                        currentRow++;
                        document.getElementById(`row-${currentRow}`).classList.add('active');
                    } else {
                        document.getElementById('msg').innerText = "🏆 فوز ساحق!";
                    }
                }, 300);
            }
        }

        function resetRow() {
            const bricks = document.querySelectorAll(`#row-${currentRow} .brick`);
            bricks.forEach(b => { b.classList.remove('wrong', 'correct'); b.innerHTML = ''; });
        }
    </script>
</body>
</html>
