<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>APPLE HACK VIP 🍎</title>
    <style>
        :root { --bg-color: #0b0e14; --accent-gold: #ffcc00; --neon-blue: #00f3ff; --win-green: #2ecc71; --bomb-red: #e74c3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        .overlay { position: fixed; inset: 0; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { background: #161b22; padding: 35px 25px; border-radius: 25px; border: 2px solid var(--accent-gold); text-align: center; width: 90%; max-width: 350px; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #444; background: #000; color: var(--accent-gold); font-size: 1.2rem; text-align: center; }
        .btn-3d { padding: 15px; width: 100%; border-radius: 15px; border: none; background: linear-gradient(180deg, #ffcc00, #b38f00); color: #000; font-weight: 900; cursor: pointer; }
        .brick { height: 45px; background: #2a2f3a; border-radius: 8px; border: 1px solid #444; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }
        .brick.correct { background: var(--win-green) !important; }
        .brick.wrong { background: var(--bomb-red) !important; }
    </style>
</head>
<body>

    <div id="pass-screen" class="overlay">
        <div class="login-box">
            <h2>CORE ACCESS 🔐</h2>
            <input type="text" id="pass-input" placeholder="كلمة المرور">
            <button class="btn-3d" onclick="checkPass()">دخول</button>
        </div>
    </div>

    <div id="id-screen" class="overlay" style="display:none">
        <div class="login-box">
            <h2>ID LOGIN 🆔</h2>
            <input type="text" id="id-input" placeholder="أدخل الـ ID">
            <button class="btn-3d" onclick="checkID()">تنشيط</button>
        </div>
    </div>

    <div id="main-game" style="display:none; height:100%">
        <div id="game-board" style="display:flex; flex-direction:column-reverse; gap:8px; width:95%; max-width:320px; margin:20px auto;"></div>
        <button class="btn-3d" onclick="startGame()">جولة جديدة</button>
    </div>

    <script>
        const P1 = "102075";
        let P2 = [];

        // حط هنا رابط الـ Raw بتاع ملف ids.txt بتاعك
        const IDS_URL = "https://raw.githubusercontent.com/HHack-Vip/my-brick-game/main/ids.txt";

        async function fetchIDs() {
            try {
                let response = await fetch(IDS_URL + "?t=" + Date.now());
                let text = await response.text();
                P2 = text.split('\n').map(id => id.trim()).filter(id => id !== "");
                console.log("الأيدي المتاح:", P2);
            } catch (e) { alert("خطأ في الاتصال بالسيرفر!"); }
        }
        fetchIDs();

        function checkPass() {
            if (document.getElementById('pass-input').value === P1) {
                document.getElementById('pass-screen').style.display = 'none';
                document.getElementById('id-screen').style.display = 'flex';
            } else { alert("خطأ!"); }
        }

        function checkID() {
            let val = document.getElementById('id-input').value.trim();
            if (P2.includes(val)) {
                document.getElementById('id-screen').style.display = 'none';
                document.getElementById('main-game').style.display = 'flex';
            } else { alert("ID غير صحيح!"); }
        }

        // باقي وظائف اللعبة كما هي...
        function startGame() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                let rDiv = document.createElement('div');
                rDiv.className = 'row active';
                let b = document.createElement('div');
                b.className = 'brick';
                b.onclick = () => { b.classList.add('correct'); b.innerHTML='🍎'; };
                rDiv.appendChild(b);
                board.appendChild(rDiv);
            }
        }
    </script>
</body>
</html>
