<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تحدي التفاحة الخشبية 🍎</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --wood-light: #a0522d;
            --wood-dark: #5d2906;
            --wood-border: #3d1c02;
            --accent-gold: #ffcc00;
        }
        
        body {
            margin: 0; background-color: var(--bg-color); color: white;
            font-family: sans-serif; display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .login-box {
            background: #161b22; padding: 25px; border-radius: 15px;
            border: 2px solid var(--accent-gold); text-align: center;
        }
        input { padding: 10px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; width: 80%; margin: 15px 0; text-align: center; }

        #main-game { display: none; width: 100%; flex-direction: column; align-items: center; height: 100%; }

        .header { 
            padding: 10px; text-align: center; width: 100%; 
            background: #161b22; border-bottom: 1px solid #30363d;
        }
        
        #game-board {
            display: flex; flex-direction: column-reverse; gap: 5px; padding: 10px;
            width: 90vw; max-width: 340px; 
            flex-grow: 1; justify-content: center; /* يتوسط الشاشة ويترك مساحة للأزرار */
        }

        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; opacity: 0.2; pointer-events: none; }
        .row.active { opacity: 1; pointer-events: auto; }

        /* شكل الطوبة الخشبية */
        .brick {
            height: 38px; /* تصغير الارتفاع لتظهر الأزرار */
            background: linear-gradient(135deg, var(--wood-light), var(--wood-dark));
            border: 1px solid var(--wood-border);
            border-radius: 4px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            box-shadow: inset 0 2px 2px rgba(255,255,255,0.2), 0 3px 0 #000;
            font-size: 1.2rem;
            position: relative;
        }

        .brick:active { transform: translateY(2px); box-shadow: 0 1px 0 #000; }

        .brick.correct {
            background: linear-gradient(135deg, #ffd700, #b8860b) !important;
            box-shadow: 0 0 10px var(--accent-gold);
        }

        .brick.wrong {
            background: #222 !important;
            box-shadow: none;
            opacity: 0.7;
        }

        .controls { 
            padding: 15px; display: flex; gap: 10px; width: 100%; 
            justify-content: center; background: #161b22;
        }
        
        button { 
            background: var(--accent-gold); color: #000; border: none; 
            padding: 10px 20px; border-radius: 10px; font-weight: bold; 
            cursor: pointer; font-size: 0.9rem;
        }
        .btn-reset { background: #444; color: white; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h2 style="color: var(--accent-gold);">دخول المغامرة 🍎</h2>
            <input type="password" id="pass-input" placeholder="كلمة السر">
            <button onclick="checkCode()" style="width: 100%;">دخول</button>
        </div>
    </div>

    <div id="main-game">
        <div class="header">
            <div id="msg" style="color: var(--accent-gold); font-weight: bold;">توقع مكان التفاحة! 🍎</div>
            <div style="font-size: 0.8rem; color: #888;">المستوى: <span id="lvl-num" style="color: white;">1</span> / 10</div>
        </div>

        <div id="game-board"></div>

        <div class="controls">
            <button class="btn-reset" onclick="resetCurrentLevel()">تصفير الدور 🔄</button>
            <button onclick="initGame()">من جديد 🚩</button>
        </div>
    </div>

    <script>
        const SECRET_CODE = "151994";
        const board = document.getElementById('game-board');
        const lvlDisplay = document.getElementById('lvl-num');
        const msgDisplay = document.getElementById('msg');
        let currentRow = 0;
        const difficulty = [1, 1, 1, 1, 2, 2, 2, 3, 3, 4];
        let levelData = [];

        function checkCode() {
            if (document.getElementById('pass-input').value === SECRET_CODE) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-game').style.display = 'flex';
                initGame();
            }
        }

        function initGame() {
            board.innerHTML = ''; currentRow = 0; levelData = []; lvlDisplay.innerText = 1;
            msgDisplay.innerText = "توقع مكان التفاحة! 🍎";
            for (let i = 0; i < 10; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row' + (i === 0 ? ' active' : '');
                rowDiv.id = `row-${i}`;
                let indices = [0, 1, 2, 3, 4];
                let wrongPos = indices.sort(() => Math.random() - 0.5).slice(0, difficulty[i]);
                levelData.push(wrongPos);
                for (let j = 0; j < 5; j++) {
                    const brick = document.createElement('div');
                    brick.className = 'brick';
                    brick.id = `brick-${i}-${j}`;
                    brick.onclick = () => handleBrickClick(i, j);
                    rowDiv.appendChild(brick);
                }
                board.appendChild(rowDiv);
            }
        }

        function handleBrickClick(r, c) {
            const brick = document.getElementById(`brick-${r}-${c}`);
            if (brick.classList.contains('correct') || brick.classList.contains('wrong')) return;

            if (levelData[r].includes(c)) {
                // في حالة الخطأ: يظهر الرمز لكن لا يغلق الدور
                brick.classList.add('wrong'); 
                brick.innerHTML = '💣'; 
                msgDisplay.innerText = "فخ! جرب صندوق تاني 💣";
            } else {
                // في حالة الفوز بالدور
                brick.classList.add('correct'); 
                brick.innerHTML = '🍎'; 
                setTimeout(() => nextLevel(), 300);
            }
        }

        function nextLevel() {
            if (currentRow < 9) {
                document.getElementById(`row-${currentRow}`).classList.remove('active');
                currentRow++;
                document.getElementById(`row-${currentRow}`).classList.add('active');
                lvlDisplay.innerText = currentRow + 1;
                msgDisplay.innerText = "عاش! كمل الصعود 🍎";
            } else {
                msgDisplay.innerText = "🏆 مبروك! كسبت اللعبة!";
            }
        }

        function resetCurrentLevel() {
            const bricks = document.querySelectorAll(`#row-${currentRow} .brick`);
            bricks.forEach(b => { b.classList.remove('wrong', 'correct'); b.innerHTML = ''; });
            msgDisplay.innerText = "تم تصفير المحاولات في هذا الدور";
        }
    </script>
</body>
</html>
