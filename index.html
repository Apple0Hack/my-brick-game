<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تحدي التفاحة 🍎</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --wood-light: #a0522d;
            --wood-dark: #5d2906;
            --accent-gold: #ffcc00;
        }
        
        * { box-sizing: border-box; }

        body {
            margin: 0; background-color: var(--bg-color); color: white;
            font-family: sans-serif; display: flex; flex-direction: column;
            height: 100vh; width: 100vw; overflow: hidden;
        }

        #lock-screen {
            position: fixed; inset: 0; background: var(--bg-color);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .login-box {
            background: #161b22; padding: 20px; border-radius: 15px;
            border: 2px solid var(--accent-gold); text-align: center; width: 80%;
        }
        input { padding: 10px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; width: 100%; margin: 10px 0; text-align: center; }

        #main-game { 
            display: none; flex-direction: column; height: 100%; width: 100%; 
        }

        .header { 
            height: 60px; display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: #161b22; border-bottom: 1px solid #30363d;
        }
        
        #game-board {
            flex: 1; /* هذا يجعل اللوحة تأخذ كل المساحة المتبقية وتصغر لو لزم الأمر */
            display: flex; flex-direction: column-reverse; 
            gap: 2px; padding: 5px; width: 100%; max-width: 320px;
            margin: 0 auto; justify-content: center;
        }

        .row { 
            display: grid; grid-template-columns: repeat(5, 1fr); 
            gap: 4px; opacity: 0.15; pointer-events: none;
            flex: 1; max-height: 35px; /* تحديد أقصى ارتفاع للصف */
        }
        .row.active { opacity: 1; pointer-events: auto; }

        .brick {
            height: 100%; min-height: 25px;
            background: linear-gradient(135deg, var(--wood-light), var(--wood-dark));
            border: 1px solid #3d1c02; border-radius: 4px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 2px 0 #000;
            font-size: 0.9rem;
        }

        .brick.correct { background: linear-gradient(135deg, #ffd700, #b8860b) !important; }
        .brick.wrong { background: #222 !important; box-shadow: none; opacity: 0.7; }

        .controls { 
            height: 70px; display: flex; gap: 10px; width: 100%; 
            justify-content: center; align-items: center; 
            background: #161b22; border-top: 1px solid #30363d;
            padding-bottom: env(safe-area-inset-bottom); /* لدعم هواتف الآيفون الحديثة */
        }
        
        button { 
            background: var(--accent-gold); color: #000; border: none; 
            padding: 10px 15px; border-radius: 8px; font-weight: bold; 
            cursor: pointer; font-size: 0.8rem;
        }
        .btn-reset { background: #444; color: white; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h2 style="color: var(--accent-gold); margin: 0 0 10px 0;">APPLE GAME 🍎</h2>
            <input type="password" id="pass-input" placeholder="كلمة السر">
            <button onclick="checkCode()" style="width: 100%;">دخول</button>
        </div>
    </div>

    <div id="main-game">
        <div class="header">
            <div id="msg" style="color: var(--accent-gold); font-weight: bold; font-size: 0.9rem;">توقع مكان التفاحة! 🍎</div>
            <div style="font-size: 0.7rem; color: #888;">المستوى: <span id="lvl-num" style="color: white;">1</span> / 10</div>
        </div>

        <div id="game-board"></div>

        <div class="controls">
            <button class="btn-reset" onclick="resetCurrentLevel()">تراجع 🔄</button>
            <button onclick="initGame()">جديد 🚩</button>
        </div>
    </div>

    <script>
        const SECRET_CODE = "151994";
        const board = document.getElementById('game-board');
        const lvlDisplay = document.getElementById('lvl-num');
        const msgDisplay = document.getElementById('msg');
        let currentRow = 0;
        const difficulty = [1, 1, 1, 1, 2, 2, 2, 3, 3, 4];
        let levelData = [];

        function checkCode() {
            if (document.getElementById('pass-input').value === SECRET_CODE) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-game').style.display = 'flex';
                initGame();
            }
        }

        function initGame() {
            board.innerHTML = ''; currentRow = 0; levelData = []; lvlDisplay.innerText = 1;
            msgDisplay.innerText = "توقع مكان التفاحة! 🍎";
            for (let i = 0; i < 10; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row' + (i === 0 ? ' active' : '');
                rowDiv.id = `row-${i}`;
                let indices = [0, 1, 2, 3, 4];
                let wrongPos = indices.sort(() => Math.random() - 0.5).slice(0, difficulty[i]);
                levelData.push(wrongPos);
                for (let j = 0; j < 5; j++) {
                    const brick = document.createElement('div');
                    brick.className = 'brick';
                    brick.id = `brick-${i}-${j}`;
                    brick.onclick = () => handleBrickClick(i, j);
                    rowDiv.appendChild(brick);
                }
                board.appendChild(rowDiv);
            }
        }

        function handleBrickClick(r, c) {
            const brick = document.getElementById(`brick-${r}-${c}`);
            if (brick.classList.contains('correct') || brick.classList.contains('wrong')) return;
            if (levelData[r].includes(c)) {
                brick.classList.add('wrong'); brick.innerHTML = '💣';
            } else {
                brick.classList.add('correct'); brick.innerHTML = '🍎';
                setTimeout(() => nextLevel(), 300);
            }
        }

        function nextLevel() {
            if (currentRow < 9) {
                document.getElementById(`row-${currentRow}`).classList.remove('active');
                currentRow++;
                document.getElementById(`row-${currentRow}`).classList.add('active');
                lvlDisplay.innerText = currentRow + 1;
            } else {
                msgDisplay.innerText = "🏆 فوز أسطوري!";
            }
        }

        function resetCurrentLevel() {
            const bricks = document.querySelectorAll(`#row-${currentRow} .brick`);
            bricks.forEach(b => { b.classList.remove('wrong', 'correct'); b.innerHTML = ''; });
        }
    </script>
</body>
</html>
