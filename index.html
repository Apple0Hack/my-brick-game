<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المغامرة الواقعية - دخول خاص</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --brick-main: #3a4452;
            --brick-side: #252d38;
            --correct-glow: #2ecc71;
            --accent: #58a6ff;
        }
        body {
            margin: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #1c2533 0%, #0b0e14 100%);
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 2000;
        }
        .login-box {
            background: #161b22; padding: 30px; border-radius: 15px;
            border: 1px solid var(--accent); text-align: center;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
        }
        input {
            padding: 12px; border-radius: 8px; border: 1px solid #30363d;
            background: #0d1117; color: white; text-align: center;
            font-size: 1.2rem; margin: 15px 0; width: 80%;
        }
        #main-game { display: none; width: 100%; flex-direction: column; align-items: center; }
        .header {
            padding: 20px; text-align: center; background: rgba(22, 27, 34, 0.8);
            width: 100%; backdrop-filter: blur(5px); border-bottom: 1px solid #30363d;
        }
        #game-board {
            display: flex; flex-direction: column-reverse; gap: 12px; padding: 20px;
            perspective: 1200px; width: 90vw; max-width: 400px; height: 70vh;
        }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; opacity: 0.15; pointer-events: none; transition: all 0.4s ease; transform: rotateX(15deg); }
        .row.active { opacity: 1; pointer-events: auto; transform: rotateX(0deg) scale(1.02); }
        .brick {
            height: 45px; background: var(--brick-main); border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 6px 0 var(--brick-side); transition: all 0.1s;
        }
        .brick:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--brick-side); }
        .brick.correct { background: linear-gradient(to bottom, #2ecc71, #27ae60) !important; box-shadow: 0 6px 0 #1e8449; }
        .brick.wrong { background: linear-gradient(to bottom, #e74c3c, #c0392b) !important; box-shadow: 0 6px 0 #922b21; }
        button { background: var(--accent); color: black; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="lock-screen">
        <div class="login-box">
            <h2 style="color: var(--accent);">مطلوب كود الدخول</h2>
            <input type="password" id="pass-input" placeholder="ادخل الباسورد">
            <br>
            <button onclick="checkCode()">دخول</button>
            <p id="error-msg" style="color: #e74c3c; font-size: 0.8rem; margin-top: 10px;"></p>
        </div>
    </div>
    <div id="main-game">
        <div class="header">
            <div id="msg" style="color: var(--accent); font-weight: bold;">اكتشف الجوهرة للصعود! 💎</div>
            <div style="font-size: 0.9rem;">المستوى: <span id="lvl-num">1</span> / 12</div>
        </div>
        <div id="game-board"></div>
    </div>
    <script>
        const SECRET_CODE = "151994"; 

        function checkCode() {
            const input = document.getElementById('pass-input').value;
            if (input === SECRET_CODE) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-game').style.display = 'flex';
                initGame();
            } else { 
                document.getElementById('error-msg').innerText = "كود خاطئ!"; 
            }
        }

        const board = document.getElementById('game-board');
        const msgDisplay = document.getElementById('msg');
        const lvlDisplay = document.getElementById('lvl-num');
        let currentRow = 0; 
        const difficulty = [1, 1, 1, 1, 2, 2, 2, 3, 3, 4, 4, 4];

        function initGame() {
            board.innerHTML = ''; currentRow = 0; lvlDisplay.innerText = 1;
            for (let i = 0; i < 12; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row' + (i === 0 ? ' active' : '');
                rowDiv.id = `row-${i}`;
                let wrongPositions = Array.from({length: 5}, (_, v) => v).sort(() => Math.random() - 0.5).slice(0, difficulty[i]);
                for (let j = 0; j < 5; j++) {
                    const brick = document.createElement('div');
                    brick.className = 'brick';
                    brick.onclick = () => {
                        if (wrongPositions.includes(j)) {
                            brick.classList.add('wrong'); brick.innerHTML = '✘';
                            setTimeout(() => { alert('خسرت! حاول مرة تانية'); initGame(); }, 200);
                        } else {
                            brick.classList.add('correct'); brick.innerHTML = '💎';
                            handleNextLevel();
                        }
                    };
                    rowDiv.appendChild(brick);
                }
                board.appendChild(rowDiv);
            }
        }

        function handleNextLevel() {
            if (currentRow === 11) { msgDisplay.innerText = "🏆 مبروك! أنت بطل حقيقي!"; return; }
            document.getElementById(`row-${currentRow}`).classList.remove('active');
            currentRow++;
            document.getElementById(`row-${currentRow}`).classList.add('active');
            lvlDisplay.innerText = currentRow + 1;
        }
    </script>
</body>
</html>
