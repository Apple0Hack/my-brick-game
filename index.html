<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تحدي التفاحة 🍎</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --wood-light: #a0522d;
            --wood-dark: #5d2906;
            --accent-gold: #ffcc00;
            --win-green: #2ecc71;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color); color: white;
            font-family: sans-serif; display: flex; flex-direction: column;
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* الهيدر */
        .header { 
            height: 45px; display: flex; align-items: center; justify-content: space-around;
            background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0;
        }
        
        /* منطقة اللعبة القابلة للتمرير */
        #game-container {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column;
            align-items: center; padding: 10px 0;
        }

        #game-board {
            display: flex; flex-direction: column-reverse; gap: 4px;
            width: 90vw; max-width: 300px;
        }

        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; opacity: 0.15; pointer-events: none; }
        .row.active { opacity: 1; pointer-events: auto; }

        .brick {
            height: 35px; background: linear-gradient(135deg, var(--wood-light), var(--wood-dark));
            border: 1px solid #3d1c02; border-radius: 4px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 2px 0 #000;
            font-size: 1rem;
        }

        .brick.correct { background: var(--win-green) !important; box-shadow: 0 0 10px var(--win-green); }
        .brick.wrong { background: #222 !important; box-shadow: none; opacity: 0.7; }

        /* منطقة الأزرار الثابتة تماماً في الأسفل */
        .controls { 
            height: 75px; display: flex; gap: 10px; width: 100%; 
            justify-content: center; align-items: center; 
            background: #161b22; border-top: 2px solid var(--accent-gold);
            padding-bottom: 15px; flex-shrink: 0;
        }
        
        button { 
            background: var(--accent-gold); color: #000; border: none; 
            padding: 12px 20px; border-radius: 10px; font-weight: bold; 
            cursor: pointer; font-size: 0.9rem; min-width: 100px;
        }
        .btn-reset { background: #444; color: white; }

        /* شاشة القفل */
        #lock-screen {
            position: fixed; inset: 0; background: var(--bg-color);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .login-box {
            background: #161b22; padding: 20px; border-radius: 15px;
            border: 2px solid var(--accent-gold); text-align: center; width: 85%;
        }
        input { padding: 12px; margin: 10px 0; width: 100%; text-align: center; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h2 style="color: var(--accent-gold);">APPLE GAME 🍎</h2>
            <input type="password" id="pass-input" placeholder="باسورد الدخول">
            <button onclick="checkCode()" style="width: 100%;">دخول</button>
        </div>
    </div>

    <div id="main-game" style="display:none; flex-direction: column; height: 100%;">
        <div class="header">
            <div id="msg" style="color: var(--accent-gold); font-weight: bold; font-size: 0.8rem;">توقع مكان التفاحة! 🍎</div>
            <div style="font-size: 0.7rem; color: #888;">المستوى: <span id="lvl-num" style="color: white;">1</span></div>
        </div>

        <div id="game-container">
            <div id="game-board"></div>
        </div>

        <div class="controls">
            <button class="btn-reset" onclick="resetCurrentLevel()">تراجع 🔄</button>
            <button onclick="initGame()">جديد 🚩</button>
        </div>
    </div>

    <script>
        const SECRET_CODE = "102075";
        const board = document.getElementById('game-board');
        const lvlDisplay = document.getElementById('lvl-num');
        const msgDisplay = document.getElementById('msg');
        let currentRow = 0;
        const difficulty = [1, 1, 1, 1, 2, 2, 2, 3, 3, 4];
        let levelData = [];

        function checkCode() {
            if (document.getElementById('pass-input').value === SECRET_CODE) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-game').style.display = 'flex';
                initGame();
            }
        }

        function initGame() {
            board.innerHTML = ''; currentRow = 0; levelData = []; lvlDisplay.innerText = 1;
            msgDisplay.innerText = "توقع مكان التفاحة! 🍎";
            for (let i = 0; i < 10; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row' + (i === 0 ? ' active' : '');
                rowDiv.id = `row-${i}`;
                let indices = [0, 1, 2, 3, 4];
                let wrongPos = indices.sort(() => Math.random() - 0.5).slice(0, difficulty[i]);
                levelData.push(wrongPos);
                for (let j = 0; j < 5; j++) {
                    const brick = document.createElement('div');
                    brick.className = 'brick';
                    brick.id = `brick-${i}-${j}`;
                    brick.onclick = () => handleBrickClick(i, j);
                    rowDiv.appendChild(brick);
                }
                board.appendChild(rowDiv);
            }
            // سكرول لآخر اللوحة (البداية من تحت)
            document.getElementById('game-container').scrollTop = board.scrollHeight;
        }

        function handleBrickClick(r, c) {
            const brick = document.getElementById(`brick-${r}-${c}`);
            if (brick.classList.contains('correct') || brick.classList.contains('wrong')) return;
            if (levelData[r].includes(c)) {
                brick.classList.add('wrong'); brick.innerHTML = '💣';
            } else {
                brick.classList.add('correct'); brick.innerHTML = '🍎';
                setTimeout(() => nextLevel(), 300);
            }
        }

        function nextLevel() {
            if (currentRow < 9) {
                document.getElementById(`row-${currentRow}`).classList.remove('active');
                currentRow++;
                document.getElementById(`row-${currentRow}`).classList.add('active');
                lvlDisplay.innerText = currentRow + 1;
                // سكرول بسيط ليفوق لمتابعة الدور
                document.getElementById('game-container').scrollBy({ top: -40, behavior: 'smooth' });
            } else {
                msgDisplay.innerText = "🏆 فوز أسطوري!";
            }
        }

        function resetCurrentLevel() {
            const bricks = document.querySelectorAll(`#row-${currentRow} .brick`);
            bricks.forEach(b => { b.classList.remove('wrong', 'correct'); b.innerHTML = ''; });
        }
    </script>
</body>
</html>
